services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KEYSENTINEL_DATABASE_URL=postgresql+asyncpg://keysentinel:keysentinel@postgres:5432/keysentinel
      - KEYSENTINEL_REDIS_URL=redis://redis:6379/0
      - KEYSENTINEL_CELERY_BROKER_URL=redis://redis:6379/1
      - KEYSENTINEL_CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.pipeline.worker worker --loglevel=info
    environment:
      - KEYSENTINEL_DATABASE_URL=postgresql+asyncpg://keysentinel:keysentinel@postgres:5432/keysentinel
      - KEYSENTINEL_REDIS_URL=redis://redis:6379/0
      - KEYSENTINEL_CELERY_BROKER_URL=redis://redis:6379/1
      - KEYSENTINEL_CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=keysentinel
      - POSTGRES_PASSWORD=keysentinel
      - POSTGRES_DB=keysentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keysentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
